<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/home.css">
    <title>Quizz Bendy</title>
</head>
<body>
    <div class="todas" >
 <img class="logo" src="imagens/logoBendy.png" alt="left"> <!-- logo game -->

    <img class="bendy" src="imagens/Bendy.png" alt="center"> <!-- bendy img -->

     <a href="Login.html" onclick="sessionStorage.setItem('fromHome', 'true')">
        <img class="login"  src="imagens/login.png" alt="right"> <!-- img que Linka a pagina de login --> 
    </a>
    </div>

<audio id="meuAudio" loop muted>
  <source src="songs/Sketches (Main Menu) - Bendy and the Ink Machine [OST] - EmeraldPlayer2989 (youtube).mp3" type="audio/mpeg">
</audio>

<script>
  const audio = document.getElementById('meuAudio');

  // Inicia o áudio mutado de forma 100% automática
  window.addEventListener('DOMContentLoaded', () => {
    audio.play().catch(err => console.log("Autoplay bloqueado:", err));
  });

  // Ativa o som no primeiríssimo clique do usuário na página
  function ativarSom() {
    audio.muted = false; 
    // Tenta dar play novamente caso o autoplay inicial tenha falhado
    audio.play(); 
    
    // Remove o evento para o som não ficar reiniciando nos próximos cliques
    document.removeEventListener('click', ativarSom);
  }

  // Escuta qualquer clique na página para liberar o áudio
 document.addEventListener('click', ativarSom);
</script>
</body>
</html>
